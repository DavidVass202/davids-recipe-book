<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>David's Dishes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,800&family=Inter+Tight:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4ede1;
    --bg-card: #fbf6ec;
    --ink: #1f1a14;
    --ink-soft: #5a4f3f;
    --ink-faded: #8a7d6a;
    --accent: #c5462a;
    --accent-deep: #8e2f1c;
    --olive: #6b7341;
    --olive-deep: #4a5028;
    --gold: #c89b3c;
    --line: #d9cdb8;
    --carb: #c89b3c;
    --protein: #c5462a;
    --fat: #6b7341;
    --sidebar-width: 260px;
    --sidebar-collapsed-width: 56px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    font-family: 'Inter Tight', sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    overflow: hidden;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(197, 70, 42, 0.04) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(107, 115, 65, 0.05) 0%, transparent 50%);
  }

  .app {
    display: grid;
    grid-template-columns: var(--sidebar-width) 1fr;
    height: 100vh;
    transition: grid-template-columns 0.3s ease;
  }

  .app.collapsed { grid-template-columns: var(--sidebar-collapsed-width) 1fr; }

  .sidebar {
    background: var(--bg-card);
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  .sidebar-toggle {
    position: absolute;
    top: 18px;
    right: 12px;
    z-index: 10;
    background: var(--bg-card);
    border: 1px solid var(--line);
    width: 24px;
    height: 24px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-soft);
    font-size: 12px;
    transition: all 0.2s;
  }

  .sidebar-toggle:hover {
    background: var(--ink);
    color: var(--bg-card);
    border-color: var(--ink);
  }

  .app.collapsed .sidebar-toggle { right: 50%; transform: translateX(50%); }

  .sidebar-content {
    display: flex;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
    opacity: 1;
    transition: opacity 0.2s;
  }

  .app.collapsed .sidebar-content { opacity: 0; pointer-events: none; }

  .brand {
    padding: 22px 22px 16px;
    border-bottom: 1px solid var(--line);
  }

  .brand-mark {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-faded);
    margin-bottom: 6px;
  }

  .brand-title {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 22px;
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: var(--ink);
  }

  .brand-sub {
    font-size: 11px;
    color: var(--ink-faded);
    margin-top: 4px;
  }

  .search {
    padding: 14px 22px 8px;
    position: relative;
  }

  .search input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--line);
    padding: 6px 0 6px 20px;
    font-family: inherit;
    font-size: 13px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }

  .search input:focus { border-bottom-color: var(--accent); }
  .search input::placeholder { color: var(--ink-faded); }

  .search::before {
    content: '⌕';
    position: absolute;
    left: 22px;
    top: 17px;
    color: var(--ink-faded);
    font-size: 16px;
  }

  .tags {
    padding: 10px 22px 14px;
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    border-bottom: 1px solid var(--line);
  }

  .tag-chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 8px;
    border: 1px solid var(--line);
    border-radius: 100px;
    background: transparent;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.2s;
  }

  .tag-chip:hover { border-color: var(--ink-soft); }
  .tag-chip.active {
    background: var(--ink);
    color: var(--bg-card);
    border-color: var(--ink);
  }

  .recipe-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
  }

  .recipe-list::-webkit-scrollbar { width: 4px; }
  .recipe-list::-webkit-scrollbar-track { background: transparent; }
  .recipe-list::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }

  .recipe-item {
    padding: 12px 22px;
    border-left: 3px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
  }

  .recipe-item:hover { background: rgba(197, 70, 42, 0.04); }
  .recipe-item.active {
    border-left-color: var(--accent);
    background: rgba(197, 70, 42, 0.06);
  }

  .recipe-item-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--ink-faded);
    letter-spacing: 0.1em;
  }

  .recipe-item-title {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 15px;
    line-height: 1.25;
    margin-top: 2px;
    letter-spacing: -0.01em;
  }

  .recipe-item-meta {
    font-size: 10px;
    color: var(--ink-faded);
    margin-top: 3px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.04em;
  }

  .sidebar-footer {
    padding: 14px 22px;
    border-top: 1px solid var(--line);
    display: flex;
    gap: 6px;
  }

  .btn-add {
    flex: 1;
    background: var(--ink);
    color: var(--bg-card);
    border: none;
    padding: 9px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-add:hover { background: var(--accent); }

  .btn-export {
    background: transparent;
    color: var(--ink-soft);
    border: 1px solid var(--line);
    padding: 9px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-export:hover {
    border-color: var(--ink-soft);
    color: var(--ink);
  }

  .main {
    overflow-y: auto;
    position: relative;
  }

  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--line); border-radius: 6px; }

  .recipe {
    max-width: 920px;
    margin: 0 auto;
    padding: 56px 72px 100px;
    animation: fadeIn 0.5s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .recipe-header {
    border-bottom: 1px solid var(--line);
    padding-bottom: 32px;
    margin-bottom: 36px;
    position: relative;
  }

  .recipe-eyebrow {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-faded);
    margin-bottom: 14px;
  }

  .recipe-eyebrow::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .recipe-title {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 56px;
    line-height: 0.98;
    letter-spacing: -0.03em;
    margin-bottom: 14px;
    color: var(--ink);
  }

  .recipe-description {
    font-size: 17px;
    line-height: 1.55;
    color: var(--ink-soft);
    max-width: 620px;
    margin-bottom: 28px;
    font-family: 'Fraunces', serif;
    font-weight: 300;
  }

  .recipe-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    padding-top: 4px;
  }

  .stat {
    border-left: 2px solid var(--ink);
    padding-left: 12px;
  }

  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-faded);
    margin-bottom: 4px;
  }

  .stat-value {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }

  .stat-value small {
    font-size: 12px;
    color: var(--ink-faded);
    font-weight: 400;
    margin-left: 2px;
  }

  .macros {
    margin-top: 24px;
    padding: 18px 20px;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 2px;
  }

  .macros-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .macros-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-faded);
  }

  .macros-target {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--ink-faded);
    letter-spacing: 0.05em;
  }

  .macros-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  .macro {
    display: flex;
    flex-direction: column;
  }

  .macro-bar {
    height: 5px;
    background: rgba(0,0,0,0.06);
    border-radius: 100px;
    overflow: hidden;
    margin-bottom: 8px;
  }

  .macro-bar-fill {
    height: 100%;
    border-radius: 100px;
    transition: width 0.5s ease;
  }

  .macro-carb .macro-bar-fill { background: var(--carb); }
  .macro-protein .macro-bar-fill { background: var(--protein); }
  .macro-fat .macro-bar-fill { background: var(--fat); }

  .macro-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 4px;
  }

  .macro-values {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }

  .macro-grams {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 500;
    color: var(--ink);
  }

  .macro-grams small {
    font-size: 11px;
    color: var(--ink-faded);
    font-weight: 400;
  }

  .macro-pct {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-faded);
    letter-spacing: 0.05em;
  }

  .servings-control {
    background: var(--bg-card);
    border: 1px solid var(--line);
    padding: 16px 20px;
    margin-bottom: 36px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-radius: 2px;
  }

  .servings-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  .servings-buttons {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .serv-btn {
    width: 30px;
    height: 30px;
    border: 1px solid var(--line);
    background: transparent;
    font-size: 14px;
    color: var(--ink);
    cursor: pointer;
    border-radius: 50%;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .serv-btn:hover:not(:disabled) {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  .serv-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .serv-count {
    font-family: 'Fraunces', serif;
    font-size: 24px;
    font-weight: 500;
    min-width: 40px;
    text-align: center;
  }

  .recipe-body {
    display: grid;
    grid-template-columns: 1fr 1.4fr;
    gap: 52px;
  }

  .section-heading {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink);
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }

  .section-heading .count { color: var(--ink-faded); }

  .ing-group { margin-bottom: 24px; }

  .ing-group-title {
    font-family: 'Fraunces', serif;
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 8px;
    font-weight: 500;
  }

  .ing-list { list-style: none; }

  .ing-item {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px dotted var(--line);
    font-size: 14px;
  }

  .ing-item:last-child { border-bottom: none; }

  .ing-amount {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    color: var(--ink);
    white-space: nowrap;
    min-width: 70px;
    font-size: 14px;
  }

  .ing-name {
    color: var(--ink-soft);
    flex: 1;
  }

  .step { margin-bottom: 28px; }

  .step-num {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 32px;
    color: var(--ink-faded);
    line-height: 1;
    margin-bottom: 6px;
    display: block;
  }

  .step-title {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 17px;
    margin-bottom: 6px;
    letter-spacing: -0.01em;
    color: var(--ink);
  }

  .step-body {
    color: var(--ink-soft);
    font-size: 14.5px;
    line-height: 1.65;
  }

  .step-body strong {
    color: var(--ink);
    font-weight: 600;
  }

  .notes {
    margin-top: 52px;
    padding: 24px 28px;
    background: linear-gradient(135deg, rgba(107, 115, 65, 0.08), rgba(200, 155, 60, 0.06));
    border-left: 3px solid var(--olive);
    border-radius: 2px;
  }

  .notes-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--olive-deep);
    margin-bottom: 10px;
  }

  .notes-body {
    font-family: 'Fraunces', serif;
    font-size: 15px;
    line-height: 1.6;
    color: var(--ink-soft);
    font-weight: 400;
  }

  /* SUBSTITUTES */
  .subs {
    margin-top: 32px;
    padding: 24px 28px;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 2px;
  }

  .subs-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .subs-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .subs-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px 28px;
  }

  @media (min-width: 700px) {
    .subs-grid { grid-template-columns: 1fr 1fr; }
  }

  .sub-item {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto minmax(0, 1.4fr);
    align-items: baseline;
    gap: 8px;
    padding: 8px 0;
    font-size: 14px;
    line-height: 1.5;
    border-bottom: 1px dotted var(--line);
  }

  .sub-item:last-child { border-bottom: none; }

  .sub-from {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    color: var(--ink);
    word-wrap: break-word;
    overflow-wrap: break-word;
  }

  .sub-arrow {
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    font-size: 13px;
  }

  .sub-to {
    color: var(--ink-soft);
    word-wrap: break-word;
    overflow-wrap: break-word;
  }

  .shopping {
    margin-top: 32px;
    padding: 24px 28px;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 2px;
  }

  .shopping-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .shopping-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .shopping-list {
    list-style: none;
    display: grid;
    grid-template-columns: 1fr;
    gap: 0 28px;
  }

  @media (min-width: 700px) {
    .shopping-list { grid-template-columns: 1fr 1fr; }
  }

  .shopping-item {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px dotted var(--line);
    font-size: 14px;
  }

  .shopping-item:last-child { border-bottom: none; }

  .shopping-amount {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    color: var(--ink);
    white-space: nowrap;
    min-width: 70px;
    font-size: 14px;
  }

  .shopping-name {
    color: var(--ink-soft);
    flex: 1;
  }

  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    padding: 40px;
    color: var(--ink-faded);
  }

  .empty-mark {
    font-family: 'Fraunces', serif;
    font-size: 110px;
    color: var(--line);
    line-height: 1;
    margin-bottom: 14px;
  }

  .empty p {
    font-family: 'Fraunces', serif;
    font-size: 17px;
  }

  .recipe-tags {
    display: flex;
    gap: 5px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }

  .recipe-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 9px;
    background: var(--ink);
    color: var(--bg-card);
    border-radius: 100px;
  }

  .recipe-tag.olive { background: var(--olive); }
  .recipe-tag.gold { background: var(--gold); color: var(--ink); }

  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(31, 26, 20, 0.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(4px);
  }

  .modal-bg.show { display: flex; }

  .modal {
    background: var(--bg-card);
    width: 90%;
    max-width: 720px;
    max-height: 88vh;
    overflow-y: auto;
    padding: 36px;
    border-radius: 4px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
  }

  .modal h2 {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    margin-bottom: 6px;
    letter-spacing: -0.02em;
    font-weight: 500;
    color: var(--ink);
  }

  .modal p.modal-sub {
    color: var(--ink-faded);
    font-size: 13px;
    margin-bottom: 24px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }

  .form-row-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }

  .form-field { margin-bottom: 14px; }

  .form-field label {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }

  .form-field input,
  .form-field textarea,
  .form-field select {
    width: 100%;
    background: white;
    border: 1px solid var(--line);
    padding: 9px 11px;
    font-family: inherit;
    font-size: 13px;
    color: var(--ink);
    border-radius: 2px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-field input:focus,
  .form-field textarea:focus,
  .form-field select:focus {
    border-color: var(--accent);
  }

  .form-field textarea {
    min-height: 80px;
    resize: vertical;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.6;
  }

  .form-field .hint {
    font-size: 11px;
    color: var(--ink-faded);
    margin-top: 4px;
  }

  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 22px;
    padding-top: 18px;

  const memoryStore = {};

      localStorage.setItem(t, t);
      localStorage.removeItem(t);
      return true;
    } catch (e) { return false; }
  })();

    async get(key) {

        if (hasLocalStorage) {

          return v !== null ? { key, value: v } : null;

        return key in memoryStore ? { key, value: memoryStore[key] } : null;
      } catch (e) { return null; }
    },
    async set(key, value) {
      try {
        if (hasLocalStorage) localStorage.setItem(key, value);
        else memoryStore[key] = value;
        return { key, value };
      } catch (e) {
        memoryStore[key] = value;

    try {
      const versionResult = await storage.get('seed-version');
      const savedVersion = versionResult && versionResult.value ? parseInt(versionResult.value) : 0;

      const result = await storage.get('all-recipes');
      if (result && result.value && savedVersion >= SEED_VERSION) {
        recipes = JSON.parse(result.value);
        return;
      }

      // Either no saved recipes, or seed has been updated. Merge: keep user-added recipes, refresh seeded ones.
      if (result && result.value) {
        const existing = JSON.parse(result.value);
        const seedIds = SEED_RECIPES.map(r => r.id);
        const userAdded = existing.filter(r => !seedIds.includes(r.id));
        recipes = [...SEED_RECIPES, ...userAdded];
      } else {
        recipes = SEED_RECIPES;
      }
    } catch (e) {
      recipes = SEED_RECIPES;
    }
    await saveAllRecipes();
    try {
      await storage.set('seed-version', String(SEED_VERSION));
    } catch (e) {}
  }

  async function saveAllRecipes() {
    try {
      await storage.set('all-recipes', JSON.stringify(recipes));
    } catch (e) {
      console.error('Save failed:', e);
    }
  }

  async function loadSidebarState() {
    try {
      const result = await storage.get('sidebar-collapsed');
      if (result && result.value) {
        sidebarCollapsed = result.value === 'true';
      }
    } catch (e) {}
  }

  async function saveSidebarState() {

      await storage.set('sidebar-collapsed', String(sidebarCollapsed));
    } catch (e) {
      console.error('Sidebar state save failed:', e);
    }
  }

  function calcMacroPercents(recipe) {
    const { protein, carbs, fat } = recipe;
    if (!protein || !carbs || !fat) {
      return { carb: null, protein: null, fat: null };
    }
    const carbCals = carbs * 4;
    const protCals = protein * 4;
    const fatCals = fat * 9;
    const total = carbCals + protCals + fatCals;
    return {
      carb: Math.round((carbCals / total) * 100),
      protein: Math.round((protCals / total) * 100),
      fat: Math.round((fatCals / total) * 100)
    };
  }

  function renderSidebar() {
    const tagSet = new Set();
    recipes.forEach(r => (r.tags || []).forEach(t => tagSet.add(t)));
    const tags = [...tagSet];

    const tagsEl = document.getElementById('tagFilters');
    tagsEl.innerHTML = tags.map(t =>
      `<button class="tag-chip ${activeTag === t ? 'active' : ''}" onclick="toggleTag('${t.replace(/'/g, "\\'")}')">${t}</button>`
    ).join('');

    const filtered = recipes.filter(r => {
      const q = searchQuery.toLowerCase();
      const matchesSearch = !q ||
        r.titlePlain.toLowerCase().includes(q) ||
        (r.description || '').toLowerCase().includes(q) ||
        (r.tags || []).some(t => t.toLowerCase().includes(q));
      const matchesTag = !activeTag || (r.tags || []).includes(activeTag);
      return matchesSearch && matchesTag;
    });

    const listEl = document.getElementById('recipeList');
    if (filtered.length === 0) {
      listEl.innerHTML = `<div style="padding: 30px 22px; color: var(--ink-faded); font-size: 13px;">No recipes match.</div>`;
      return;
    }

    listEl.innerHTML = filtered.map((r, i) => `
      <div class="recipe-item ${r.id === activeId ? 'active' : ''}" onclick="selectRecipe('${r.id}')">
        <div class="recipe-item-num">№ ${String(i + 1).padStart(2, '0')}</div>
        <div class="recipe-item-title">${r.titlePlain}</div>
        <div class="recipe-item-meta">${r.servings} serves · ${r.time} min${r.calories ? ' · ' + r.calories + ' kcal' : ''}</div>
      </div>
    `).join('');
  }

                <div class="stat-value">${recipe.calories}<small>kcal</small></div>

        <div class="servings-control">

            ${methodHTML}
          </section>
        </div>

        ${(() => {
          const list = buildShoppingList(recipe, scale);
          if (!list || list.length === 0) return '';
          return `
          <div class="shopping">

            <ul class="shopping-list">
              ${list.map(item => `

                  <span class="shopping-amount">${item.amount}</span>
                  <span class="shopping-name">${item.name}</span>
                </li>
              `).join('')}
            </ul>
          </div>`;
        })()}

        ${recipe.substitutes && recipe.substitutes.length > 0 ? `
          <div class="subs">

                <div class="sub-item">
                  <span class="sub-from">${scaleSubstituteText(s.from, scale)}</span>

            <div class="notes-label">Notes from the cook</div>

  }

  function countIngredients(recipe) {
    return recipe.ingredientGroups.reduce((sum, g) => sum + g.items.length, 0);
  }

  // Build a consolidated shopping list from all ingredient groups.
  // - Merges duplicate ingredients (sums grams, ml, tbsp, tsp by unit).
  // - Converts measured citrus juice/zest into whole fruits (1 lemon = ~45ml juice).
  // - Counts whole-item ingredients (garlic cloves, onions, eggs).
  // - Filters out "to taste" / cosmetic items already implied (salt, pepper, water).
  function buildShoppingList(recipe, scale) {
    const items = []; // { key, displayName, amounts: { unit: number } }
    const map = {};

    function normalise(name) {
      // Strip parenthetical notes and trailing qualifiers for grouping
      return name
        .toLowerCase()
        .replace(/\([^)]*\)/g, '')
        .replace(/,.*$/, '')
        .replace(/\bfreshly\b|\btoasted\b|\bminced\b|\bgrated\b|\bcrumbled\b|\bsliced\b|\bdiced\b|\bchopped\b|\brinsed\b|\bcubed\b|\bquartered\b|\bhalved\b|\bthinly\b|\bfinely\b|\bdry\b|\bhot\b/g, '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function addItem(key, displayName, unit, amount) {
      if (!map[key]) {
        map[key] = { displayName, amounts: {} };
        items.push(map[key]);
      }
      map[key].amounts[unit] = (map[key].amounts[unit] || 0) + amount;
    }

    recipe.ingredientGroups.forEach(g => {
      g.items.forEach(item => {
        const name = (item.name || '').trim();
        if (!name) return;

        const nameLower = name.toLowerCase();
        const normalisedName = normalise(name);
        const unit = (item.unit || '').toLowerCase();
        const rawAmount = parseFloat(item.amount);
        const amount = isNaN(rawAmount) ? 0 : rawAmount * scale;

        // Skip water and seasoning-level items already in most kitchens
        if (/^water$/.test(normalisedName)) return;
        if (/^salt$/.test(normalisedName) || /^black pepper$/.test(normalisedName) || /^pepper$/.test(normalisedName)) return;

        // Lemon juice / lemon zest / lemon wedge => whole lemons
        // 1 medium lemon yields ~45ml juice and enough zest. A wedge = 1/4 lemon.
        if (/lemon (juice|zest|wedge)|^lemon,? juiced|lemon,? to squeeze/.test(nameLower)) {
          let lemonsNeeded = 0;
          if (unit === 'ml') lemonsNeeded = amount / 45;
          else if (unit === 'tbsp') lemonsNeeded = amount / 3; // ~3 tbsp per lemon
          else if (unit === 'tsp') lemonsNeeded = amount / 9;
          else if (/wedge/.test(nameLower)) lemonsNeeded = amount * 0.25;
          else if (/zest/.test(nameLower)) lemonsNeeded = Math.max(amount, 1) * 0.5; // a zest = half a lemon's worth
          else lemonsNeeded = amount; // "1 lemon, juiced"
          addItem('lemon', 'lemons', 'whole', lemonsNeeded);
          return;
        }

        // "half a lemon, juiced" or "1/2 lemon" — handled by item.amount as 0.5
        if (/^lemon$/.test(normalisedName) || /^lemons?$/.test(normalisedName)) {
          addItem('lemon', 'lemons', 'whole', amount || 1);
          return;
        }

        // Garlic: minced garlic in tbsp vs whole garlic cloves
        // 1 garlic clove ≈ 1 tsp minced. 1 tbsp minced = 3 cloves.
        if (/garlic/.test(nameLower) && !/garlic powder/.test(nameLower)) {
          let cloves = 0;
          if (unit === 'tbsp') cloves = amount * 3;
          else if (unit === 'tsp') cloves = amount;
          else if (/clove/.test(nameLower) || unit === '' || !unit) cloves = amount;
          else cloves = amount;
          addItem('garlic', 'garlic cloves', 'whole', cloves);
          return;
        }

        // Onions: combine red onion separate from yellow/white onion separate from spring
        // Exclude onion powder which is a dried spice.
        let onionKey = null;
        if (/onion powder/.test(nameLower)) {
          // Falls through to default handling as a spice
        } else if (/red onion/.test(nameLower)) onionKey = 'red onions';
        else if (/spring onion/.test(nameLower)) onionKey = 'spring onions';
        else if (/yellow onion|white onion|brown onion|^onion/.test(nameLower)) onionKey = 'onions';
        if (onionKey) {
          if (unit === 'g') addItem(onionKey, onionKey, 'g', amount);
          else addItem(onionKey, onionKey, 'whole', amount);
          return;
        }

        // Default: group by normalised name and unit
        const key = normalisedName + '|' + unit;
        // Use the original first-seen display name, stripped of qualifiers
        const display = name.replace(/\([^)]*\)/g, '').replace(/,.*$/, '').trim();
        if (unit === 'handful') {
          addItem(normalisedName, display, 'handful', amount || 1);
        } else if (unit === 'g' || unit === 'ml' || unit === 'tbsp' || unit === 'tsp' || unit === 'cup' || unit === 'cups') {
          addItem(normalisedName, display, unit, amount);
        } else {
          // No/unknown unit: treat as whole item count
          addItem(normalisedName, display, 'whole', amount || 1);
        }
      });
    });

    // Format each item to a display string
    return items.map(it => {
      const parts = [];
      const a = it.amounts;
      let displayName = it.displayName;

      if (a.g) parts.push(roundGrams(a.g) + 'g');
      if (a.ml) parts.push(roundGrams(a.ml) + 'ml');
      if (a.tbsp) {
        const n = Math.round(a.tbsp * 2) / 2;
        parts.push((Number.isInteger(n) ? n : n) + ' tbsp');
      }
      if (a.tsp) {
        const n = Math.round(a.tsp * 2) / 2;
        parts.push((Number.isInteger(n) ? n : n) + ' tsp');
      }
      if (a.cup) {
        const n = Math.round(a.cup * 4) / 4;
        parts.push(n + ' cup' + (n > 1 ? 's' : ''));
      }
      if (a.cups) {
        const n = Math.round(a.cups * 4) / 4;
        parts.push(n + ' cup' + (n > 1 ? 's' : ''));
      }
      if (a.handful) {
        const n = Math.max(1, Math.round(a.handful));
        parts.push(n + ' handful' + (n > 1 ? 's' : ''));
      }
      if (a.whole) {
        const n = Math.max(1, Math.ceil(a.whole));
        parts.push(n);
      }

      return {
        amount: parts.join(' + ') || '—',
        name: displayName
      };
    });
  }

  function scaleAmount(amount, scale) {
    if (amount === '1' && scale === 1) return amount;
    const num = parseFloat(amount);
    if (isNaN(num)) return amount;
    const result = num * scale;
    if (Number.isInteger(result)) return String(result);
    if (result < 1) return result.toFixed(2).replace(/\.?0+$/, '');
    return result.toFixed(1).replace(/\.0$/, '');
  }

  function roundGrams(g) {
    if (g <= 0) return 0;
    if (g < 30) return Math.round(g / 5) * 5;
    if (g < 300) return Math.round(g / 10) * 10;
    return Math.round(g / 50) * 50;
  }

  function scaleSubstituteText(text, scale) {
    if (scale === 1) return text;
    return text.replace(/(~?)(\d+(?:\.\d+)?)\s*(kg|g|ml|l|tbsp|tsp|cup|cups)\b/gi, (match, tilde, numStr, unit) => {
      const num = parseFloat(numStr);
      const unitLower = unit.toLowerCase();
      let scaled = num * scale;
      let outUnit = unitLower;

      // Convert kg to g and l to ml per project preferences
      if (unitLower === 'kg') { scaled *= 1000; outUnit = 'g'; }
      else if (unitLower === 'l') { scaled *= 1000; outUnit = 'ml'; }

      let display;
      if (outUnit === 'g' || outUnit === 'ml') {
        display = roundGrams(scaled);
      } else {
        // tbsp, tsp, cup - round to nearest quarter
        const rounded = Math.round(scaled * 4) / 4;
        display = Number.isInteger(rounded) ? String(rounded) : String(rounded);
      }

      return tilde + display + outUnit;
    });
  }

  function selectRecipe(id) {
    activeId = id;
    const r = recipes.find(x => x.id === id);
    activeServings = r.servings;
    renderSidebar();
    renderMain();
    // Close mobile drawer when picking a recipe
    document.getElementById('app').classList.remove('mobile-open');
    // Scroll main back to top
    document.getElementById('main').scrollTop = 0;
  }

  function changeServings(delta) {
    activeServings = Math.max(1, activeServings + delta);
    renderMain();
  }

  function toggleTag(tag) {
    activeTag = activeTag === tag ? null : tag;
    renderSidebar();
  }

  document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value;
    renderSidebar();
  });

  document.getElementById('sidebarToggle').addEventListener('click', async () => {
    sidebarCollapsed = !sidebarCollapsed;
    applySidebarState();
    await saveSidebarState();
  });

  // Mobile drawer wiring
  document.getElementById('mobileMenuBtn').addEventListener('click', function() {
    document.getElementById('app').classList.toggle('mobile-open');
  });
  document.getElementById('mobileBackdrop').addEventListener('click', function() {
    document.getElementById('app').classList.remove('mobile-open');
  });

  function applySidebarState() {
    const app = document.getElementById('app');
    const toggle = document.getElementById('sidebarToggle');
    if (sidebarCollapsed) {
      app.classList.add('collapsed');
      toggle.textContent = '›';
    } else {
      app.classList.remove('collapsed');
      toggle.textContent = '‹';
    }
  }

  function openModal(id = null) {
    editingId = id;
    const modal = document.getElementById('modal');
    const titleEl = document.getElementById('modalTitle');
    const deleteBtn = document.getElementById('deleteBtn');

    if (id) {
      const r = recipes.find(x => x.id === id);
      titleEl.textContent = 'Edit Recipe';
      deleteBtn.style.display = 'inline-block';
      document.getElementById('f-title').value = r.titlePlain;
      document.getElementById('f-description').value = r.description || '';
      document.getElementById('f-servings').value = r.servings;
      document.getElementById('f-time').value = r.time;
      document.getElementById('f-calories').value = r.calories || '';
      document.getElementById('f-protein').value = r.protein || '';
      document.getElementById('f-carbs').value = r.carbs || '';
      document.getElementById('f-fat').value = r.fat || '';
      document.getElementById('f-tags').value = (r.tags || []).join(', ');
      document.getElementById('f-ingredients').value = ingredientsToText(r.ingredientGroups);
      document.getElementById('f-method').value = methodToText(r.method);
      document.getElementById('f-substitutes').value = substitutesToText(r.substitutes || []);
      document.getElementById('f-notes').value = r.notes || '';
    } else {
      titleEl.textContent = 'New Recipe';
      deleteBtn.style.display = 'none';
      ['f-title','f-description','f-calories','f-protein','f-carbs','f-fat','f-tags','f-ingredients','f-method','f-substitutes','f-notes'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('f-servings').value = 4;
      document.getElementById('f-time').value = 40;
    }

    modal.classList.add('show');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('show');
  }

  function editRecipe(id) { openModal(id); }

  async function deleteRecipe() {
    if (!editingId) return;
    if (!confirm('Delete this recipe?')) return;
    recipes = recipes.filter(r => r.id !== editingId);
    if (activeId === editingId) {
      activeId = recipes[0] ? recipes[0].id : null;
      activeServings = recipes[0] ? recipes[0].servings : 4;
    }
    await saveAllRecipes();
    closeModal();
    renderSidebar();
    renderMain();
  }

  function ingredientsToText(groups) {
    return groups.map(g => {
      const header = g.name ? g.name + ':\n' : '';
      const items = g.items.map(i => {
        const amt = i.unit ? `${i.amount}${i.unit === 'handful' ? ' ' : ''}${i.unit}` : i.amount;
        return `${amt} ${i.name}`;
      }).join('\n');
      return header + items;
    }).join('\n');
  }

  function methodToText(method) {
    return method.map(s => `${s.title} | ${s.body.replace(/<strong>|<\/strong>|<em>|<\/em>/g, '')}`).join('\n');
  }

  function parseIngredients(text) {
    const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
    const groups = [];
    let current = { name: '', items: [] };

    lines.forEach(line => {
      if (line.endsWith(':')) {
        if (current.items.length > 0) groups.push(current);
        current = { name: line.slice(0, -1), items: [] };
      } else {
        const match = line.match(/^([\d./]+)\s*(g|kg|ml|l|tbsp|tsp|cup|cups|handful|whole|small|medium|large)?\s+(.+)$/i);
        if (match) {
          current.items.push({
            amount: match[1],
            unit: (match[2] || '').toLowerCase(),
            name: match[3]
          });
        } else {
          current.items.push({ amount: '', unit: '', name: line });
        }
      }
    });

    if (current.items.length > 0) groups.push(current);
    if (groups.length === 0) groups.push({ name: '', items: [] });
    return groups;
  }

  function parseMethod(text) {
    return text.split('\n').map(l => l.trim()).filter(Boolean).map(line => {
      const idx = line.indexOf('|');
      if (idx === -1) {
        return { title: 'Step', body: line };
      }
      return {
        title: line.slice(0, idx).trim(),
        body: line.slice(idx + 1).trim()
      };
    });
  }

  function parseSubstitutes(text) {
    return text.split('\n').map(l => l.trim()).filter(Boolean).map(line => {
      const match = line.match(/^(.+?)\s*(?:->|→|=>)\s*(.+)$/);
      if (match) {
        return { from: match[1].trim(), to: match[2].trim() };
      }
      return null;
    }).filter(Boolean);
  }

  function substitutesToText(subs) {
    return subs.map(s => `${s.from} -> ${s.to}`).join('\n');
  }

  async function saveRecipe() {
    const title = document.getElementById('f-title').value.trim();
    if (!title) { alert('Please add a title'); return; }

    const data = {
      id: editingId || 'r-' + Date.now(),
      titlePlain: title,
      description: document.getElementById('f-description').value.trim(),
      servings: parseInt(document.getElementById('f-servings').value) || 4,
      time: parseInt(document.getElementById('f-time').value) || 40,
      calories: parseInt(document.getElementById('f-calories').value) || null,
      protein: parseFloat(document.getElementById('f-protein').value) || null,
      carbs: parseFloat(document.getElementById('f-carbs').value) || null,
      fat: parseFloat(document.getElementById('f-fat').value) || null,
      tags: document.getElementById('f-tags').value.split(',').map(t => t.trim()).filter(Boolean),
      ingredientGroups: parseIngredients(document.getElementById('f-ingredients').value),
      method: parseMethod(document.getElementById('f-method').value),
      substitutes: parseSubstitutes(document.getElementById('f-substitutes').value),
      notes: document.getElementById('f-notes').value.trim()
    };

    if (editingId) {
      const idx = recipes.findIndex(r => r.id === editingId);
      recipes[idx] = data;
    } else {
      recipes.push(data);
    }

    activeId = data.id;
    activeServings = data.servings;
    await saveAllRecipes();
    closeModal();
    renderSidebar();
    renderMain();
  }

  function exportData() {
    const json = JSON.stringify(recipes, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'davids-dishes-recipes.json';
    a.click();
    URL.revokeObjectURL(url);
  }

  (async function init() {
    try {
      recipes = SEED_RECIPES.slice();
      activeId = recipes[0] ? recipes[0].id : null;
      activeServings = recipes[0] ? recipes[0].servings : 4;

      try {
        var s = localStorage.getItem('sidebar-collapsed');
        if (s) sidebarCollapsed = s === 'true';
      } catch (e) {}
      applySidebarState();

      renderSidebar();
      renderMain();

      try {
        await loadRecipes();
        if (recipes && recipes.length > 0) {
          if (!recipes.find(function(r){ return r.id === activeId; })) {
            activeId = recipes[0].id;
            activeServings = recipes[0].servings;
          }
          renderSidebar();
          renderMain();
        }
      } catch (e) {
        console.error('Storage load failed, using seeds:', e);
      }
    } catch (e) {
      var el = document.getElementById('recipeList');
      if (el) el.innerHTML = '<div style="padding:30px 22px;color:#c5462a;font-size:12px;">Init error: ' + e.message + '</div>';
    }
  })();
</script>
